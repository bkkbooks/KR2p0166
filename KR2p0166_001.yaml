body:
  text: 楚竹書九容成氏昔者容成氏大庭氏伯皇氏中央氏粟陸氏驪畜氏祝融氏昊英氏有巢氏葛天氏陰康氏朱襄氏無懷氏尊盧氏赫胥氏高辛氏倉頡氏軒轅氏神農氏渾敦氏伏羲氏之有天下也皆不授其子而授賢其德瀏清而上愛下而一其志而寢其兵而官其材於是乎喑聾執燭矇瞽鼓瑟跛躃守門侏儒為矢張者戚施僂者事數癭者煮鹽宅瀀者漁澤害棄不舉凡民卑末者教而誨之飲而食之思役百官而月請之故當是時也亡併氏之有天下厚施而薄斂安身力以勞百姓於是乎不賞不罰不刑不殺邦無食人道路無殤死者上下貴賤各得其宜四海之外賓四海之內定禽獸朝魚鱉獻有無通匡天下之政十有九年而王天下三十有七年而泯終昔者堯處於丹府與藋陵之閒堯賤施而時時賞不勸而民力不刑殺而無盜賊甚緩而民服於是乎方圓百里之中率天下之人就而立之以為天子於是乎方圓千里之中於是乎匡反正位四向委和懷以徠天下之民其政治而不賞官而不爵無勵於民而治亂不倦故曰賢及是以視賢履地戴天篤義與信會在天地之閒而包在四海之內畢能其事而立為天子堯為之教曰自入焉余穴窺焉以求賢者而讓賢堯以天下讓於賢者天下之賢者莫之能受也萬邦之君皆以其邦讓於賢者讓天下賢者而賢者莫之能受也於是乎天下之人以能受也堯為善興賢而卒立之昔者舜耕於鬲丘陶於河濱漁於雷澤孝養父母以善其親乃及邦子堯聞之而美其行堯於是乎為車十有五乘以三從舜於畎畝之中舜於是乎始免刈斸耨鍤席而坐之子堯南面舜北面舜於是乎始語堯天地人民之道與之言政悅簡以行與之言樂悅和以長與之言禮悅薄以不逆堯乃悅堯堯乃老視不明聽不聰堯有子九人不以其子為後見舜之賢也而欲以為後舜乃五讓以天下之賢者不得已然後敢受之舜聽政三年山陵不疏水潦不湝乃立禹以為司工禹既已受命乃卉服箁箬帽芙蓻匹面乾粗脛不生趾毛開塞湝流禹親執畚耜以陂明都之澤決九河之阻於是乎夾州徐州始可處也禹通淮與沂東注之海於是乎競州莒州始可處也禹乃通蔞與易注之海於是乎并州始可處也禹乃通三江五湖東注之海於是乎荊州揚州始可處也禹乃通伊洛併瀍澗東注之河於是乎豫州始可處也禹乃通涇與渭北注之河於是乎雍州始可處也禹乃從漢以南為名谷五百從漢以北為名谷五百天下之民居定乃飭食乃立后稷以為畯后稷既已受命乃食於野宿於野復穀豢土五年乃穰民有餘食無求不得民乃賽驕態始作乃立臯陶以為李臯陶既已受命乃辨陰陽之氣而聽其訟獄三年而天下之人亡訟獄者天下大和均舜乃欲會天地之氣而聽用之乃立質以為樂正質既受命作為六律六呂辨為五音以定男女之聲當是時也癘疫不至妖祥不行禍災去亡禽獸肥大草木蓁長昔者天地之佐舜而佑善如是狀也舜乃老視不明聽不聰舜有子七人不以其子為後見禹之賢也而欲以為後禹乃五讓以天下之賢者不得已然後敢受之禹聽政三年不製革不刃金不略矢田無雈宅不空關市無賦禹乃因山陵平隰之可封邑者而繁實之乃因邇以知遠去苛而行簡因民之欲會天地之利夫是以近者悅治而遠者自至四海之內及四海之外皆請貢禹然後始為之號旗以辨其左右使民毋惑東方之旗以日西方之旗以月南方之旗以蛇中正之旗以熊北方之旗以鳥禹然後始行以儉衣不鮮美食不重味朝不車逆舂不毇米宰不折骨製不孝辰方為三調救聲之紀東方為三調西方為三調南方為三調北方為三調以躗於溪谷濟於廣川高山登蓁林入焉以行政於是乎治爵而行祿以讓於來翼翼通通曰德速催表皮專禹乃建鼓於廷以為民之有訟告者鼓焉撞鼓禹必速出冬不敢以寒辭夏不敢以暑辭身言身教淵所曰聖人其生賜養也其死賜葬去苛慝是以為名禹有子五人不以其子為後見臯陶之賢也而欲以為後臯陶乃五讓以天下之賢者遂稱疾不出而死禹於是乎讓益啓於是乎攻益自取啓王天下十有六世而桀作桀不述其先王之道自為昏為於不量其力之不足起師以伐岷山氏取其兩女琰琬夥伴北去其邦宮築為璿室飾為瑤臺立為玉門其驕泰如是狀湯聞之於是乎慎戒登賢德惠而不恃三十仁而能之如是而不可然後從而攻之降自武遂入自北門立於中闌桀乃逃之鬲山氏湯又從而攻之降自鳴條之遂以伐高神之門桀乃逃之南巢氏湯又從而攻之遂逃去之蒼梧之野湯於是乎徵九州之師以伐四海之內於是乎天下之兵大起於是乎亢宗戮族殘群焉服當是時強弱不辭聽衆寡不聽訟天地四時之事不修湯乃博為征籍以征關市民乃宜怨虐疾始生於是乎有喑聾跛眇癭痗僂始起湯乃謀戒求賢乃立伊尹以為佐伊尹既已受命乃執兵禁暴佯得于民遂迷而賊盜夫是以得衆而王天下湯王天下三十有一世而受作受不述其先王之道自為昏為惡是乎作為九成之臺置盂炭其下加圜木於其上思民蹈之能遂者遂不能遂者入而死不從而命者從而桎梏之於是乎作為金桎三千既為金桎又為酒池厚樂於酒晡夜以為淫不聽其邦之政於是乎九邦叛之豐鎬舟于鹿黎崇密須氏文王聞之曰雖君亡道臣敢勿事乎雖父亡道子敢勿事乎孰天子而可反受聞之乃出文王於夏臺之下而問焉曰九邦者其可來乎文王曰可文王於是乎素端褰裳以行九邦七邦來服豐鎬不服文王乃起師嚮豐鎬三鼓而進之三鼓而退之曰吾所知多災一人為亡道百姓其何罪豐鎬之民聞之乃降文王文王時故時而教民時高下肥磽之利盡知之知天之道知地之利使民不疾昔者文王之佐受也如是狀也文王崩武王即位武王曰成德者吾說而代之其次吾伐而代之今受為無道屠昏百姓制約諸侯天將誅焉吾勴天威之武王於是乎作為革車千乘帶甲萬人戊午之日涉於孟津至於共縢之閒三軍大範武王乃出革車五百乘帶甲三千以小會諸侯之師於牧之野受不知其未有成政而得失行於民之朕也或亦起師以逆之武王於是乎素冠冕以告憫于天曰受為亡道昏者百姓制約諸侯絶種侮姓土玉水酒天將誅焉吾勴天威之武王素甲以陳於殷郊而殷容成氏
